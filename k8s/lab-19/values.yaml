grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsEnabled: true
  service:
    type: ClusterIP

prometheus-node-exporter:
  enabled: false   # skip if you already deleted your manual DaemonSet in step 3

alertmanager:
  config:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'mamdouhhazemm@gmail.com'
      smtp_auth_username: 'mamdouhhazemm@gmail.com'
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-gmail-secret/password
      smtp_require_tls: true
    route:
      receiver: gmail-alerts
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      routes: []
    receivers:
      - name: gmail-alerts
        email_configs:
          - to: 'mamdouhhazemm@gmail.com'
  alertmanagerSpec:
    secrets:
      - alertmanager-gmail-secret